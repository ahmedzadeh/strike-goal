<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strike Goal - Physics Soccer Puzzle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-overlay">
            <div id="top-bar">
                <div class="ui-element">
                    <span class="label">Level:</span>
                    <span id="level-number">1</span>
                </div>
                <div class="ui-element">
                    <span class="label">Shots:</span>
                    <span id="shots-taken">0</span>
                </div>
                <div class="ui-element">
                    <span class="label">Score:</span>
                    <span id="score">0</span>
                </div>
                <button id="restart-btn" class="ui-button">↻ Restart</button>
            </div>
            
            <div id="power-indicator">
                <div id="power-bar"></div>
            </div>
            
            <div id="aim-indicator"></div>
        </div>
        
        <div id="level-complete" class="modal hidden">
            <div class="modal-content">
                <h2>Level Complete!</h2>
                <p>Shots taken: <span id="final-shots">0</span></p>
                <div class="star-rating">
                    <span class="star" data-star="1">⭐</span>
                    <span class="star" data-star="2">⭐</span>
                    <span class="star" data-star="3">⭐</span>
                </div>
                <button id="next-level-btn" class="ui-button">Next Level</button>
            </div>
        </div>
    </div>
    
    <!-- Load scripts in order -->
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/vector2d.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/entities/striker.js"></script>
    <script src="js/entities/ball.js"></script>
    <script src="js/entities/goal.js"></script>
    <script src="js/entities/obstacle.js"></script>
    <script src="js/input/inputHandler.js"></script>
    <script src="js/levels/levelManager.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
